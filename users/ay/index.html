<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;background:#FFE600;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 20px,
    rgba(0,0,0,0.04) 20px,rgba(0,0,0,0.04) 22px),
    repeating-linear-gradient(90deg,transparent,transparent 20px,
    rgba(0,0,0,0.04) 20px,rgba(0,0,0,0.04) 22px);
  font-family:'Fredoka',sans-serif;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;position:relative;overflow-x:hidden;
}
.speed-line{position:fixed;pointer-events:none;z-index:0;
  height:3px;background:#000;opacity:0.06;
  animation:sl-move .8s linear infinite}
@keyframes sl-move{from{transform:translateX(-200px)}to{transform:translateX(calc(100vw + 200px))}}
.card{
  position:relative;z-index:1;max-width:420px;width:100%;
  background:#fff;
  border:4px solid #000;
  box-shadow:8px 8px 0 0 #000,12px 12px 0 0 rgba(255,45,45,0.15);
  border-radius:4px;
  padding:0;overflow:visible;
  clip-path:polygon(0% 0%,100% 0%,100% calc(100% - 20px),calc(100% - 20px) 100%,0% 100%);
  animation:comicIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes comicIn{from{opacity:0;transform:scale(.9) rotate(-2deg)}to{opacity:1;transform:none}}
.card-inner{padding:28px 22px 22px;position:relative}
.speech-bubble{
  position:absolute;top:-14px;right:16px;
  background:#FFE600;border:3px solid #000;
  border-radius:0 16px 16px 16px;
  padding:8px 16px;font-family:'Bangers',cursive;
  font-size:13px;color:#000;letter-spacing:.5px;
  transform:rotate(4deg);
  box-shadow:3px 3px 0 0 #000;
}
.speech-bubble::before{content:'';position:absolute;bottom:-12px;left:20px;
  width:14px;height:14px;background:#FFE600;
  clip-path:polygon(0 0,100% 0,0 100%)}
.header-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.comic-av{width:64px;height:64px;border-radius:4px;overflow:hidden;
  border:3px solid #000;flex-shrink:0}
.comic-av img{width:100%;height:100%;object-fit:cover;display:block}
.header-row h1{font-family:'Bangers',cursive;font-size:28px;color:#FF2D2D;
  letter-spacing:1px;line-height:1;text-shadow:3px 3px 0 #000,0 0 0 #000;
  -webkit-text-stroke:1px #000}
.header-row .nick{font-family:'Fredoka',sans-serif;font-size:11px;
  color:#fff;background:#2D7FFF;display:inline-block;
  padding:2px 10px;border:2px solid #000;box-shadow:2px 2px 0 0 #000;
  margin-top:4px}
.bio{
  background:#fff;border:3px solid #000;
  padding:14px 16px;margin-bottom:16px;
  font-size:14px;color:#000;line-height:1.7;
  font-family:'Fredoka',sans-serif;font-weight:600;
  border-radius:0 20px 20px 20px;
  box-shadow:4px 4px 0 0 #000;
}
.comic-player{
  background:#2D7FFF;border:3px solid #000;
  padding:16px;margin-bottom:16px;
  box-shadow:4px 4px 0 0 #000;
  border-radius:0 16px 16px 16px;
}
.cp-label{font-family:'Bangers',cursive;font-size:12px;color:#FFE600;
  letter-spacing:1px;margin-bottom:8px}
.cp-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.cp-bub{width:30px;height:30px;background:#FFE600;border:2px solid #000;
  display:flex;align-items:center;justify-content:center;color:#000;
  font-size:12px}
.playing .cp-bub i{animation:cp-spin .6s linear infinite}
@keyframes cp-spin{to{transform:rotate(360deg)}}
.cp-c{font-size:18px;color:#fff}
.cp-btn{background:#FF2D2D;border:3px solid #000;color:#fff;
  border-radius:2px;padding:8px 20px;font-family:'Bangers',cursive;
  font-size:14px;letter-spacing:1px;cursor:pointer;display:inline-flex;
  align-items:center;gap:6px;box-shadow:3px 3px 0 0 #000;
  transition:all .1s}
.cp-btn:active{transform:translate(3px,3px);box-shadow:none}
.socials{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
.soc-comic{display:inline-flex;align-items:center;gap:4px;
  background:#fff;border:3px solid #000;padding:4px 11px;
  font-size:11px;color:#000;text-decoration:none;font-weight:700;
  box-shadow:3px 3px 0 0 #000;transition:all .1s}
.soc-comic:active{transform:translate(3px,3px);box-shadow:none}
.soc-comic:hover{background:#FFE600}
.ft{font-family:'Bangers',cursive;font-size:11px;color:#000;
  letter-spacing:1px;text-align:center}
</style></head><body>
